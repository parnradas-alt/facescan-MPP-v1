<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบแจ้งลาหยุด</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0d1b2a 100%);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 16px;
    }
    .container {
      width: 100%;
      max-width: 450px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    h2 { text-align: center; margin-bottom: 25px; color: #fff; font-weight: 700; }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #94a3b8; }
    
    input, select, textarea {
      width: 100%;
      padding: 14px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-family: 'Sarabun', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #6366f1;
      background: rgba(0, 0, 0, 0.3);
    }
    
    .btn-submit {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.2s;
    }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.9rem;
    }
    
    #loadingOverlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>📄 แจ้งลาหยุด</h2>
    
    <form id="leaveForm">
      <div class="form-group">
        <label>ชื่อ-นามสกุล พนักงาน</label>
        <select id="employeeName" required>
          <option value="">-- เลือกรายชื่อพนักงาน --</option>
          <!-- รายชื่อจะโหลดมาจาก API -->
        </select>
      </div>

      <div class="form-group">
        <label>ประเภทการลา</label>
        <select id="leaveType" required>
          <option value="ลากิจ">ลากิจ</option>
          <option value="ลาป่วย">ลาป่วย</option>
          <option value="ลาพักร้อน">ลาพักร้อน</option>
          <option value="อื่นๆ">อื่นๆ</option>
        </select>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="form-group">
          <label>เริ่มวันที่</label>
          <input type="date" id="startDate" required>
        </div>
        <div class="form-group">
          <label>ถึงวันที่</label>
          <input type="date" id="endDate" required>
        </div>
      </div>

      <div class="form-group">
        <label>เหตุผลการลา / หมายเหตุ</label>
        <textarea id="reason" rows="3" placeholder="ระบุเหตุผลการลา..."></textarea>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">ส่งคำขอลาหยุด</button>
    </form>
    
    <a href="index.html" class="back-link">🔙 กลับหน้าหลัก</a>
  </div>

  <div id="loadingOverlay">
    <div style="font-size: 2rem;">⏳</div>
    <p>กำลังดำเนินการ...</p>
  </div>

  <script>
    const API_URL = localStorage.getItem('gasApiUrl') || GAS_API_URL;

    // โหลดรายชื่อพนักงานเมื่อเปิดหน้า
    async function loadEmployees() {
      try {
        const res = await fetch(API_URL + '?action=getKnownFaces');
        const data = await res.json();
        const select = document.getElementById('employeeName');
        
        if (data.users && data.users.length > 0) {
          data.users.forEach(user => {
            const option = document.createElement('option');
            option.value = user.name;
            option.textContent = user.name;
            select.appendChild(option);
          });
        }
      } catch (e) {
        console.error('Failed to load employees', e);
      }
    }

    // จัดการการส่งฟอร์ม
    document.getElementById('leaveForm').onsubmit = async (e) => {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const loading = document.getElementById('loadingOverlay');
      
      const payload = {
        action: 'submitLeave',
        name: document.getElementById('employeeName').value,
        leaveType: document.getElementById('leaveType').value,
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        reason: document.getElementById('reason').value
      };

      if (!payload.name) return alert('กรุณาเลือกรายชื่อ');

      submitBtn.disabled = true;
      loading.style.display = 'flex';

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        const result = await res.json();
        
        if (result.success) {
          alert('✅ ส่งใบลาสำเร็จ!');
          window.location.href = 'index.html';
        } else {
          alert('❌ เกิดข้อผิดพลาด: ' + result.error);
        }
      } catch (err) {
        alert('❌ ไม่สามารถเชื่อมต่อ API ได้: ' + err.message);
      } finally {
        submitBtn.disabled = false;
        loading.style.display = 'none';
      }
    };

    // ตั้งค่าวันที่เริ่มต้นเป็นวันนี้
    window.onload = () => {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('startDate').value = today;
      document.getElementById('endDate').value = today;
      loadEmployees();
    };
  </script>
</body>
</html>
